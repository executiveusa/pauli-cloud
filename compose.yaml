services:
  pauli-cloud:
    build:
      context: .
      dockerfile: Dockerfile
    image: pauli-cloud:1.0.0
    restart: unless-stopped
    environment:
      PAULI_CLOUD_API_TOKEN: ${PAULI_CLOUD_API_TOKEN:?PAULI_CLOUD_API_TOKEN is required}
    ports:
      - "127.0.0.1:4317:4317"
    volumes:
      - ./workspace:/workspace
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4317/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
