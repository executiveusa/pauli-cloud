name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - name: Package dry run
        run: npm pack --dry-run
      - name: CLI JSON smoke test
        run: |
          temp_dir="$(mktemp -d)"
          node ./bin/pauli-cloud.mjs init "$temp_dir" --json
          node ./bin/pauli-cloud.mjs doctor "$temp_dir" --json
          node ./bin/pauli-cloud.mjs compile "$temp_dir" --agent=generic --json
          node ./bin/pauli-cloud.mjs uninstall "$temp_dir" --json

  container:
    name: Container build and smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Build image
        run: docker build --tag pauli-cloud:${{ github.sha }} .
      - name: Start container
        env:
          PAULI_CLOUD_API_TOKEN: ci-only-token
        run: |
          mkdir -p workspace
          docker run --detach --rm \
            --name pauli-cloud-ci \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            -e PAULI_CLOUD_API_TOKEN \
            -p 127.0.0.1:4317:4317 \
            -v "$PWD/workspace:/workspace" \
            pauli-cloud:${{ github.sha }}
      - name: Health and auth smoke
        env:
          PAULI_CLOUD_API_TOKEN: ci-only-token
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:4317/healthz >/dev/null; then break; fi
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:4317/healthz
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4317/v1/status)" = "401"
          curl --fail --silent \
            -H "Authorization: Bearer $PAULI_CLOUD_API_TOKEN" \
            http://127.0.0.1:4317/v1/status
      - if: always()
        run: docker logs pauli-cloud-ci || true
      - if: always()
        run: docker stop pauli-cloud-ci || true
