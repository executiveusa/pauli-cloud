name: Daily Self-Improvement Audit

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run check
      - run: node ./bin/pauli-cloud.mjs daily . --json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pauli-cloud-daily-${{ github.run_id }}
          path: |
            .pauli-cloud/reports/
            .pauli-cloud/evidence/
          if-no-files-found: warn
          retention-days: 30
